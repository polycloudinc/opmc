name: Publish opmc CLI

on:
  push:
    branches: [master]
    paths:
      - 'polycloud-opmc-cli-main/**'
      - '.github/workflows/publish-opmc.yaml'
      - 'version'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: polycloud-opmc-cli-main

      - name: Set version
        run: |
          source ../version
          VERSION_REVISION=$(git rev-list HEAD --count)
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          echo VERSION=$VERSION
          node -e "const p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
        working-directory: polycloud-opmc-cli-main

      - name: Build
        run: npm run build
        working-directory: polycloud-opmc-cli-main

      - name: Publish
        run: npm publish --access public
        working-directory: polycloud-opmc-cli-main
