name: Publish OPMC Skills (APM)

on:
  push:
    branches: [master]
    paths:
      - 'apm.yml'
      - '.apm/**'
      - '.github/workflows/publish-skills.yaml'
      - 'version'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag and push
        run: |
          source version
          VERSION_REVISION=$(git rev-list HEAD --count)
          TAG="v${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_REVISION}"
          echo "Tagging ${TAG}"
          git config user.email "buildbot@polycloud.co"
          git config user.name "buildbot"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
        env:
          GH_TOKEN: ${{ github.token }}
